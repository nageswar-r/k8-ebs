apiVersion: v1 
kind: PersistentVolume
metadata: 
  name: ebs
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
   storage: 5Gi
  csi: 
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-052dfb1148147bfd6
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs #this pv name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1 
kind: Pod
metadata:
  name: app-ebs-pvc
spec: 
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: html-data
      mountPath: /usr/share/nginx/html
  volumes: 
  - name: html-data
    persistentVolumeClaim: 
      claimName: ebs-claim